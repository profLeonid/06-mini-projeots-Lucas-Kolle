<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="./app.js" defer></script>
  <title>Calculadora de Média</title>
</head>

<body>

  <main>
    <div class="conteudo">

      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>
        Calculadora de
        <span>Média</span>
      </h1>
      <p class="descricao">Digite as três notas para calcular a situação do aluno.</p>

      <label>Nota 1</label>
      <input type="number" id="inserir-nota1" min="0" placeholder="0 a 10" />

      <label>Nota 2</label>
      <input type="number" id="inserir-nota2" min="0" placeholder="0 a 10" />

      <label>Nota 3</label>
      <input type="number" id="inserir-nota3" min="0" placeholder="0 a 10" />

      <button id="botao-calcular">Calcular Média</button>

      <div id="exibir-resultado" class="resultado">
        O resultado aparecerá aqui
      </div>

    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>

</body>

</html>
